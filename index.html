<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MSS Bot Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #1c2230;
    --border: #30363d;
    --text: #e6edf3;
    --dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #a371f7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0;
    padding: 16px;
    font-size: 14px;
  }
  h1 { font-size: 20px; margin: 0; }
  h2 { font-size: 14px; margin: 0 0 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .header {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }
  .status-pill.online { background: rgba(63,185,80,0.15); color: var(--green); }
  .status-pill.offline { background: rgba(248,81,73,0.15); color: var(--red); }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .status-pill.online .dot { background: var(--green); }
  .status-pill.offline .dot { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

  .bot-state-pill {
    display: inline-block; padding: 4px 12px; border-radius: 4px;
    font-family: ui-monospace, monospace; font-weight: 700; font-size: 13px;
  }
  .bot-state-pill.NO_ORDER       { background: rgba(139,148,158,0.2); color: var(--dim); }
  .bot-state-pill.PENDING_ORDER  { background: rgba(210,153,34,0.2);  color: var(--yellow); }
  .bot-state-pill.IN_POSITION    { background: rgba(63,185,80,0.2);   color: var(--green); }
  .bot-state-pill.EXIT_PENDING   { background: rgba(88,166,255,0.2);  color: var(--blue); }
  .bot-state-pill.RECONCILING    { background: rgba(248,81,73,0.2);   color: var(--red); }
  .bot-state-pill.UNKNOWN        { background: rgba(139,148,158,0.2); color: var(--dim); }

  .error-banner {
    background: rgba(248,81,73,0.12);
    border-left: 4px solid var(--red);
    padding: 14px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
  }
  .error-banner .title { color: var(--red); font-weight: 700; margin-bottom: 6px; }
  .error-banner .ts { color: var(--dim); font-size: 12px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .card-title { font-size: 11px; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
  .big { font-size: 28px; font-weight: 700; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .row .k { color: var(--dim); }
  .row .v { font-family: ui-monospace, monospace; }

  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .pnl-neutral { color: var(--dim); }

  table { width: 100%; border-collapse: collapse; font-family: ui-monospace, monospace; font-size: 12px; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }

  .event-log { max-height: 480px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px; }
  .event-log .row { padding: 4px 0; border-bottom: 1px solid var(--border); display: block; }
  .event-log .ts { color: var(--dim); margin-right: 8px; }
  .event-log .kind { display: inline-block; min-width: 90px; font-weight: 700; }
  .event-log .kind.SIGNAL    { color: var(--purple); }
  .event-log .kind.ORDER     { color: var(--green); }
  .event-log .kind.CLOSE     { color: var(--blue); }
  .event-log .kind.EXIT      { color: var(--blue); }
  .event-log .kind.CANCEL    { color: var(--yellow); }
  .event-log .kind.PIVOT-EXIT { color: var(--purple); }
  .event-log .kind.BARS      { color: var(--dim); }
  .event-log .kind.RECONCILE { color: var(--yellow); }
  .event-log .kind.HALT      { color: var(--red); }
  .event-log .kind.HARD-STOP { color: var(--red); }
  .event-log .kind.SHOT      { color: var(--yellow); }

  .footer { color: var(--dim); font-size: 11px; text-align: center; margin-top: 20px; padding: 12px; }
  .position-pill {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 11px;
  }
  .position-pill.long { background: rgba(63,185,80,0.2); color: var(--green); }
  .position-pill.short { background: rgba(248,81,73,0.2); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 MSS Bot Dashboard</h1>
  <span id="status-pill" class="status-pill offline">
    <span class="dot"></span>
    <span id="status-text">Loading...</span>
  </span>
  <span style="color: var(--dim); font-size: 12px;" id="last-tick"></span>
  <span style="margin-left: auto; color: var(--dim); font-size: 12px;" id="updated-at"></span>
</div>

<div id="error-banner" style="display:none"></div>

<!-- Live capital + bot state + position + pending -->
<div class="grid">
  <div class="card">
    <div class="card-title">總權益（即時）</div>
    <div class="big" id="live-equity">—</div>
    <div class="row"><span class="k">Available</span><span class="v" id="live-avail">—</span></div>
    <div class="row"><span class="k">Max DD</span><span class="v" id="live-dd">—</span></div>
    <div class="row"><span class="k">過去 1h errors</span><span class="v" id="errors-1h">—</span></div>
  </div>

  <div class="card">
    <div class="card-title">Bot 狀態</div>
    <div class="big"><span id="bot-state" class="bot-state-pill UNKNOWN">UNKNOWN</span></div>
    <div class="row"><span class="k">最後 5m tick</span><span class="v" id="last-bar">—</span></div>
    <div class="row"><span class="k">State 更新時間</span><span class="v" id="bot-state-ts">—</span></div>
    <div class="row"><span class="k">迴圈次數</span><span class="v" id="bot-iter">—</span></div>
  </div>

  <div class="card">
    <div class="card-title">目前持倉</div>
    <div id="position-content"><span class="pnl-neutral">無持倉</span></div>
  </div>

  <div class="card">
    <div class="card-title">掛單中</div>
    <div id="pending-content"><span class="pnl-neutral">無掛單</span></div>
  </div>
</div>

<!-- Recent activity log -->
<div class="grid" style="grid-template-columns: 1fr 1fr;">
  <div class="card">
    <h2>📜 最近活動（SIGNAL / ORDER / CLOSE / EXIT / CANCEL / PIVOT-EXIT / RECONCILE）</h2>
    <div class="event-log" id="event-log"><span class="pnl-neutral">Loading...</span></div>
  </div>
  <div class="card">
    <h2>⚠️ 最近錯誤（24h）</h2>
    <div class="event-log" id="error-log"><span class="pnl-neutral">無錯誤紀錄</span></div>
  </div>
</div>

<div class="footer">
  Updates every 5 seconds · Data from state.json · <span id="data-source">—</span>
</div>

<script>
const STATE_URL = (() => {
  const params = new URLSearchParams(location.search);
  if (params.has('remote')) return params.get('remote');
  return 'state.json';
})();

function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + '$' + Number(n).toFixed(4);
}
function pnlClass(n) {
  if (n > 0.001) return 'pnl-pos';
  if (n < -0.001) return 'pnl-neg';
  return 'pnl-neutral';
}
function ageString(sec) {
  if (sec === null || sec === undefined) return '—';
  if (sec < 60) return `${sec}秒前`;
  if (sec < 3600) return `${Math.floor(sec/60)}分${sec%60}秒前`;
  return `${Math.floor(sec/3600)}小時前`;
}

async function refresh() {
  try {
    const url = STATE_URL + '?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.statusText);
    const s = await r.json();
    render(s);
  } catch (e) {
    document.getElementById('status-text').textContent = 'state.json load failed';
    document.getElementById('status-pill').className = 'status-pill offline';
    console.error(e);
  }
}

function render(s) {
  // Status pill
  const stat = s.status || {};
  const pill = document.getElementById('status-pill');
  const text = document.getElementById('status-text');
  if (stat.online) {
    pill.className = 'status-pill online';
    text.textContent = 'LIVE';
  } else {
    pill.className = 'status-pill offline';
    text.textContent = 'OFFLINE';
  }
  document.getElementById('last-tick').textContent = stat.last_tick
    ? `最後 tick: ${stat.last_tick} (${ageString(stat.last_tick_age_sec)})`
    : '';
  document.getElementById('updated-at').textContent = `Updated: ${s.updated_at || '—'}`;
  document.getElementById('data-source').textContent = s.log_file || 'mss_bot.log';

  // Error banner
  const eb = document.getElementById('error-banner');
  const errs = (s.log && s.log.errors) || [];
  if (errs.length && s.log.error_count_1h > 0) {
    const latest = errs[errs.length - 1];
    eb.style.display = 'block';
    eb.className = 'error-banner';
    eb.innerHTML = `
      <div class="title">🔴 ${latest.level}  ·  過去 1 小時 ${s.log.error_count_1h} 個錯誤</div>
      <div class="ts">${latest.ts}</div>
      <div style="margin-top:6px">${latest.msg.substring(0,300)}</div>
    `;
  } else {
    eb.style.display = 'none';
  }
  document.getElementById('errors-1h').textContent = (s.log && s.log.error_count_1h) || 0;

  // Live equity
  const live = s.live || {};
  if (live.ok) {
    document.getElementById('live-equity').textContent = '$' + Number(live.equity).toFixed(2);
    document.getElementById('live-avail').textContent = '$' + Number(live.available).toFixed(2);
  } else {
    document.getElementById('live-equity').textContent = live.error || 'N/A';
    document.getElementById('live-avail').textContent = '—';
  }
  const ls = s.live_stats || {};
  document.getElementById('live-dd').textContent = ls.max_dd_pct ? ls.max_dd_pct.toFixed(2) + '%' : '0%';

  // Bot state
  const bot = s.bot || {};
  const botStateEl = document.getElementById('bot-state');
  const stateName = bot.state || 'UNKNOWN';
  botStateEl.textContent = stateName;
  botStateEl.className = 'bot-state-pill ' + stateName;
  document.getElementById('last-bar').textContent = stat.last_tick || '—';
  document.getElementById('bot-state-ts').textContent = bot.ts_tpe || '—';
  document.getElementById('bot-iter').textContent = (bot.extra && bot.extra.iter) || '—';

  // Position (from live MEXC)
  const pos = live.position || null;
  const posEl = document.getElementById('position-content');
  if (pos) {
    const dir = (pos.direction || pos.dir || '').toLowerCase();
    const cls = dir === 'long' ? 'long' : 'short';
    posEl.innerHTML = `
      <div class="big" style="font-size:22px;">
        <span class="position-pill ${cls}">${dir.toUpperCase()}</span>
        ${pos.size || pos.qty || '—'} SOL
      </div>
      <div class="row"><span class="k">Entry</span><span class="v">$${pos.entry || pos.avg_price || '—'}</span></div>
      <div class="row"><span class="k">Unrealized PnL</span><span class="v ${pnlClass(pos.unrealized_pnl || pos.PnL || pos.pnl || 0)}">${fmtMoney(pos.unrealized_pnl || pos.PnL || pos.pnl || 0)}</span></div>
    `;
  } else {
    posEl.innerHTML = '<span class="pnl-neutral">無持倉</span>';
  }

  // Pending (from live MEXC)
  const pendEl = document.getElementById('pending-content');
  const stops = live.stop_orders || [];
  const plans = live.plan_orders || [];
  if (stops.length || plans.length) {
    let html = '';
    for (const o of plans) {
      html += `<div class="row"><span class="k">${o.direction || 'Plan'}</span><span class="v">@ ${o.trigger_price || o.price || '—'} vol=${o.vol || '—'}</span></div>`;
    }
    for (const o of stops) {
      html += `<div class="row"><span class="k">Stop</span><span class="v">SL=${o.sl || '—'} TP=${o.tp || '—'} vol=${o.vol || '—'}</span></div>`;
    }
    pendEl.innerHTML = html;
  } else {
    pendEl.innerHTML = '<span class="pnl-neutral">無掛單</span>';
  }

  // Event log
  const events = (s.log && s.log.events) || [];
  const elog = document.getElementById('event-log');
  if (events.length) {
    elog.innerHTML = events.slice().reverse().map(e => {
      const kindClass = (e.kind || '').replace(/[^A-Z\-]/gi, '');
      return `<div class="row"><span class="ts">${(e.ts || '').substring(11)}</span><span class="kind ${kindClass}">[${e.kind || '?'}]</span>${(e.msg || '').replace(/^\[[A-Z\-]+\]\s*/,'')}</div>`;
    }).join('');
  } else {
    elog.innerHTML = '<span class="pnl-neutral">無活動</span>';
  }

  // Error log
  const errLog = document.getElementById('error-log');
  if (errs.length) {
    errLog.innerHTML = errs.slice().reverse().map(e =>
      `<div class="row"><span class="ts">${e.ts}</span><span class="kind HALT">${e.level}</span><br><span style="color:var(--dim);font-size:11px">${(e.msg || '').substring(0,200)}</span></div>`
    ).join('');
  } else {
    errLog.innerHTML = '<span class="pnl-pos">✓ 無錯誤紀錄</span>';
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
